# Redis configuration for Crescendo
# Used by: docker-compose.yml (mounted as /usr/local/etc/redis/redis.conf)
#
# Persistence strategy: AOF + RDB hybrid
# - AOF (appendonly) is the primary durability mechanism — it is Redis's WAL equivalent.
#   Every write is logged to the append-only file before being acknowledged.
# - RDB snapshots are retained as a fast-restore backup but are NOT the primary safety net.
#
# Why this matters for Crescendo specifically:
#   - Execution queue messages (Redis Streams): lost messages = silently skipped workflow runs
#   - Distributed locks: lost lock state = two instances executing the same workflow simultaneously
#   - Domain event streams: lost stream entries = outbox events never delivered
#   These are exactly the data this system can least afford to lose between snapshots.
#
# RDB alone (the Redis default) snapshots every 15 minutes at minimum. Anything written
# between snapshots is unrecoverable on a hard crash — up to 15 minutes of execution
# queue messages, lock state, and stream data.

# ─────────────────────────────────────────────────────────────────────────────
# AOF (Append-Only File) — primary durability
# ─────────────────────────────────────────────────────────────────────────────

appendonly yes

# appendfsync controls when the OS flushes the AOF buffer to disk.
#
# always   — fsync after every write command. Zero data loss. ~2-3x throughput cost.
# everysec — fsync once per second (default). At most 1 second of data loss on crash.
#            Acceptable for most workloads; throughput is close to no-fsync.
# no       — let the OS decide when to flush. Fastest, but up to 30s of data loss.
#
# For Crescendo: everysec is the correct choice. The execution queue and distributed
# locks are critical, but losing 1 second of data on a crash is recoverable
# (WorkflowRunReaper catches stuck runs, WebhookReconciliationJob catches missed webhooks).
# Losing 15 minutes (RDB) is not.
appendfsync everysec

# Disable fsync during AOF rewrite to avoid I/O stalls on rewrites.
# Safe with everysec — the rewrite buffer is flushed on rewrite completion.
no-appendfsync-on-rewrite no

# Trigger AOF rewrite when the file grows 100% beyond the last rewrite size,
# but only if the file is at least 64MB. Keeps the AOF file manageable.
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# If AOF is enabled and the last AOF write was truncated (e.g. crash mid-write),
# load the file anyway with the truncated tail discarded. Prevents startup failure
# after a crash.
aof-use-rdb-preamble yes

# ─────────────────────────────────────────────────────────────────────────────
# RDB snapshots — secondary backup (retained alongside AOF)
# ─────────────────────────────────────────────────────────────────────────────

# Keep RDB as a fast-restore fallback. On a fresh start, Redis prefers the AOF
# if both exist (when aof-use-rdb-preamble is yes, this is the RDB-preamble in the AOF).
# Standalone RDB snapshots are still useful for point-in-time backups.
#
# save <seconds> <changes>
# Snapshot if at least N changes occur within T seconds.
save 900 1     # 15 min if ≥1 change
save 300 10    # 5 min if ≥10 changes
save 60 10000  # 1 min if ≥10000 changes

# ─────────────────────────────────────────────────────────────────────────────
# Memory management
# ─────────────────────────────────────────────────────────────────────────────

maxmemory 256mb

# allkeys-lru: evict least-recently-used keys from ANY keyspace when at maxmemory.
# Correct for Crescendo — cache entries (workflows, steps, users) can be evicted
# because they are backed by the DB, but execution queue stream entries should
# not accumulate unbounded. Redis Streams have their own MAXLEN trimming; LRU
# eviction of stream entries is a last resort, not the primary cleanup mechanism.
maxmemory-policy allkeys-lru

# ─────────────────────────────────────────────────────────────────────────────
# Networking
# ─────────────────────────────────────────────────────────────────────────────

# Disable protected mode — the Docker network provides the isolation boundary.
# Without this, Redis refuses connections from non-localhost addresses.
protected-mode no

# Bind to all interfaces within the Docker network.
bind 0.0.0.0
