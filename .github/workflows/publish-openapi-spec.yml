name: Publish OpenAPI Spec and Trigger SDK Generation

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'crescendo-backend/**'
      - '.github/workflows/publish-openapi-spec.yml'

jobs:
  publish-spec:
    name: Publish Spec & Trigger SDKs
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: crescendo_ci
          POSTGRES_PASSWORD: crescendo_ci
          POSTGRES_DB: crescendo_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crescendo_ci -d crescendo_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Start backend (background)
        run: |
          cd crescendo-backend
          chmod +x mvnw
          ./mvnw -q spring-boot:run -DskipTests -Dspring.profiles.active=ci -Dspring-boot.run.profiles=ci > ../backend.log 2>&1 &
          echo $! > ../backend.pid
          for i in $(seq 1 40); do
            if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "Server is up"
              exit 0
            fi
            sleep 3
          done
          echo "Backend did not become healthy. Startup log:"
          cat ../backend.log
          exit 1

      - name: Determine API version
        id: ver
        run: |
          V="$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo '1.0.0')"
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Fetch OpenAPI Spec
        run: |
          curl --fail --show-error --silent --max-time 30 "http://localhost:8080/api-docs/crescendo-public-api-v1" -o openapi.json

      - name: Stop backend
        if: always()
        run: |
          if [ -f backend.pid ]; then
            kill $(cat backend.pid) 2>/dev/null || true
          fi

      - name: Push Spec to SDK Repository
        run: |
          git clone https://x-access-token:${{ secrets.SDK_DISPATCH_TOKEN }}@github.com/AnkitArsh19/crescendo-sdk.git sdk-repo
          mkdir -p sdk-repo/spec
          cp openapi.json sdk-repo/spec/openapi.json
          cd sdk-repo
          
          # Only push if the spec actually changed
          if ! git diff --quiet spec/openapi.json; then
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git add spec/openapi.json
            git commit -m "chore(spec): update OpenAPI spec from backend v${{ steps.ver.outputs.version }}"
            git push origin main
            echo "Successfully pushed new spec to AnkitArsh19/crescendo-sdk."
          else
            echo "Spec unchanged; nothing to push."
          fi
