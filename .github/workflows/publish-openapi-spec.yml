name: Publish OpenAPI Spec and Trigger SDK Generation

on:
  push:
    branches: [main]
    paths:
      - 'crescendo-backend/src/main/java/com/crescendo/publicapi/**'
      - 'crescendo-backend/src/main/java/com/crescendo/emailservice/email_send/**'
      - 'crescendo-backend/src/main/java/com/crescendo/emailservice/email_log/**'
      - 'crescendo-backend/src/main/java/com/crescendo/emailservice/customevent/**'
      - 'crescendo-backend/src/main/java/com/crescendo/config/OpenApiConfig.java'

jobs:
  publish-spec:
    name: Publish Spec & Trigger SDKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Start backend (background)
        run: |
          cd crescendo-backend
          ./mvnw spring-boot:run -DskipTests -Dspring-boot.run.profiles=test &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "Server is up"
              break
            fi
            sleep 3
          done

      - name: Determine API version
        id: ver
        run: |
          V="$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo '1.0.0')"
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Fetch OpenAPI Spec
        run: |
          curl -sS --max-time 15 "http://localhost:8080/api-docs/crescendo-public-api-v1" -o openapi.json


      - name: Push Spec to SDK Repository
        run: |
          git clone https://x-access-token:${{ secrets.SDK_DISPATCH_TOKEN }}@github.com/AnkitArsh19/crescendo-sdk.git sdk-repo
          mkdir -p sdk-repo/spec
          cp openapi.json sdk-repo/spec/openapi.json
          cd sdk-repo
          
          # Only push if the spec actually changed
          if ! git diff --quiet spec/openapi.json; then
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git add spec/openapi.json
            git commit -m "chore(spec): update OpenAPI spec from backend v${{ steps.ver.outputs.version }}"
            git push origin main
            echo "Successfully pushed new spec to AnkitArsh19/crescendo-sdk."
          else
            echo "Spec unchanged; nothing to push."
          fi
